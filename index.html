<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Simulasi Tryout</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
  <h2>Simulasi Tryout Panselnas</h2>
  <div id="timer"></div>
</div>

<div class="main">
  <div class="question-box">

    <div id="q-number"></div>
    <div id="question"></div>
    <div id="options"></div>

    <div class="actions">
      <button onclick="prevQuestion()">Prev</button>
      <button onclick="nextQuestion()">Next</button>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
